name: Deploy redirect site to GitHub Pages

# The rsynthbio docs have moved to https://synthesizebio.mintlify.app/r-sdk.
# This workflow keeps the old GitHub Pages URL alive by serving a small
# redirect site so existing links in papers, slides, and bookmarks don't break.

on:
  push:
    branches: [main]
    paths:
      - "docs-redirect/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Upload redirect site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
